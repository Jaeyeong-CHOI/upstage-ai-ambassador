<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upstage n8n JSON Builder</title>
  <style>
    :root {
      --bg-1: #070b1a;
      --bg-2: #121a38;
      --accent-1: #7c5cff;
      --accent-2: #33d1ff;
      --text: #f3f5ff;
      --muted: #b8bfd8;
      --card: rgba(15, 20, 42, 0.72);
      --border: rgba(130, 156, 255, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at -10% -20%, rgba(51, 209, 255, 0.22), transparent 60%),
        radial-gradient(1000px 500px at 110% -30%, rgba(124, 92, 255, 0.24), transparent 55%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 36px 16px;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(31, 40, 83, 0.55), rgba(12, 17, 36, 0.65));
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: .04em;
      margin-bottom: 12px;
    }

    .logo-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 0 16px rgba(124, 92, 255, 0.9);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
    }

    .panel {
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    label {
      display: block;
      font-weight: 700;
      margin: 10px 0 8px;
    }

    input, select {
      width: 100%;
      padding: 12px 13px;
      border-radius: 10px;
      border: 1px solid rgba(152, 173, 255, 0.35);
      background: rgba(10, 14, 29, 0.72);
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(51, 209, 255, 0.18);
    }

    button {
      margin-top: 14px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #081022;
      background: linear-gradient(120deg, var(--accent-2), var(--accent-1));
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
      box-shadow: 0 12px 24px rgba(51, 209, 255, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(124, 92, 255, 0.32);
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.45;
    }

    code {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 7px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #d8e9ff;
    }

    .footer {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="brand">
        <span class="logo-dot" aria-hidden="true"></span>
        <span>UPSTAGE</span>
      </div>
      <h1>n8n Workflow JSON Builder</h1>
      <p class="subtitle">
        Upstage 스타일의 간결한 빌더 페이지. API 키를 브라우저에서만 치환하고,
        선택한 워크플로우 JSON을 바로 다운로드합니다.
      </p>
    </section>

    <section class="panel">
      <label for="workflow">워크플로우 선택</label>
      <select id="workflow">
        <option value="workflow.upstage-hf-paper-summarizer.json">Basic</option>
        <option value="workflow.upstage-hf-paper-summarizer-advanced.json">Advanced + Feedback</option>
        <option value="workflow.research-orchestrator-pro.json">Research Orchestrator Pro</option>
      </select>

      <label for="apiKey">Upstage API Key</label>
      <input id="apiKey" type="password" placeholder="up_..." />

      <button id="downloadBtn">치환된 JSON 다운로드</button>

      <p class="muted">치환 토큰: <code>REPLACE_WITH_YOUR_REAL_KEY</code></p>
      <p class="muted">보안: 키는 서버로 전송되지 않고 브라우저에서만 치환됩니다.</p>
    </section>

    <div class="footer">upstage-n8n.jaeyeong2026.com</div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
