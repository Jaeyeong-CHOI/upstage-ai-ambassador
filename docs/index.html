<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>n8n Workflow Download</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --line: #e4e8f1;
      --text: #1f2430;
      --muted: #6d7485;
      --primary: #5b5cf0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      background: var(--bg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
    }
    .wrap {
      width: 100%;
      max-width: 760px;
    }
    .title {
      text-align: center;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(25, 31, 57, 0.06);
    }
    .card-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body {
      padding: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #3b4254;
    }
    select, input {
      width: 100%;
      padding: 11px 12px;
      margin-bottom: 12px;
      border: 1px solid #d8deeb;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #9ea7ff;
      box-shadow: 0 0 0 3px #eef0ff;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(0.97); }
    .muted {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    code {
      background: #f3f5fb;
      border: 1px solid #e2e7f3;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
      font-family: ui-monospace,SFMono-Regular,Menlo,monospace;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>n8n Workflow Download</h1>
      <div class="subtitle">Upstage API 키를 브라우저에서만 치환해 워크플로우 JSON을 다운로드합니다.</div>
    </div>

    <section class="card">
      <div class="card-head">
        <span>Workflow Builder</span>
        <button id="downloadBtn" class="btn">Download JSON</button>
      </div>
      <div class="card-body">
        <label for="workflow">Workflow</label>
        <select id="workflow">
          <option value="workflow.upstage-hf-paper-summarizer.json">Basic</option>
          <option value="workflow.upstage-hf-paper-summarizer-advanced.json">Advanced + Feedback</option>
          <option value="workflow.research-orchestrator-pro.json">Research Orchestrator Pro</option>
        </select>

        <label for="apiKey">Upstage API Key</label>
        <input id="apiKey" type="password" placeholder="up_..." />

        <p class="muted">치환 토큰: <code>REPLACE_WITH_YOUR_REAL_KEY</code></p>
        <p class="muted">보안: API 키는 서버에 저장되지 않고 브라우저에서만 처리됩니다.</p>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
